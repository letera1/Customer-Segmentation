version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./api:/app/api
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_PATH=/app/data/outputs/segmentation_model.pkl
      - SCALER_PATH=/app/data/outputs/scaler.pkl
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - segmentai

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api
    networks:
      - segmentai

networks:
  segmentai:
    driver: bridge
